<body>
<div id="root"></div>

<script type="text/babel">
  // App encadeado. Na produção isto vira react-router + RequireAuth:
  //   público  → /login /register
  //   privado  → /  (shell)  com rotas internas (/integracoes, /atendimentos, …)
  // Aqui o estado `route` simula a navegação.
  function App() {
    const [route, setRoute] = React.useState('login'); // login | cadastro | app
    const [nav, setNav] = React.useState('atendimentos'); // aba ativa no shell
    const [agente, setAgente] = React.useState(null); // agente aberto (Página do Agente)
    const [user, setUser] = React.useState(null);
                  const [contaAberta, setContaAberta] = React.useState(false);

                  React.useEffect(() => {
                    if (route === 'app' && !user) {
                      window.MegusAuth.me().then((r) => { if (r && r.success) setUser(r.data); });
                    }
                  }, [route]);

    const goNav = (n) => { setAgente(null); setNav(n); };
    const logout = () => { setAgente(null); setNav('atendimentos'); setRoute('login'); setUser(null); };

    if (route === 'login')
      return <window.MegusLogin onGoCadastro={() => setRoute('cadastro')} onSuccess={() => setRoute('app')} />;
    if (route === 'cadastro')
      return <window.MegusCadastro onGoLogin={() => setRoute('login')} />;

    // route === 'app' → shell + página interna

    const shellUser = user ? {
      name: user.displayName || user.email || 'Usuário',
      role: 'Administrador',
      email: user.email,
      displayName: user.displayName,
    } : null;
    return (
      <window.MegusShell nav={nav} onNav={goNav} onLogout={logout}
        user={shellUser} onMinhaConta={() => setContaAberta(true)}>
        {contaAberta && (
          <window.MegusMinhaContaModal
            user={user}
            onClose={() => setContaAberta(false)}
            onPerfilAtualizado={(d) => setUser((u) => ({ ...u, displayName: d.displayName }))} />
        )}
        {nav === 'integracoes'
          ? <window.MegusIntegracoesPage />
          : nav === 'cobrancas'
          ? <window.MegusCobrancasPage />
          : nav === 'empresa'
          ? <window.MegusEmpresaPage />
          : nav === 'atendimentos'
          ? (agente
              ? <window.MegusAgentePage agente={agente} onBack={() => setAgente(null)} />
              : <window.MegusAtendimentosPage onOpenAgente={setAgente} />)
          : <window.MegusEmBreve nav={nav} />}
      </window.MegusShell>
    );
  }

  // Placeholder das telas ainda não construídas (Atendimentos, Conversas, Ajustes).
  window.MegusEmBreve = function ({ nav }) {
    const T = window.MegusTokens;
    const titulos = { atendimentos: 'Atendimentos', conversas: 'Conversas', config: 'Ajustes' };
    return (
      <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 10, color: T.text.muted, fontFamily: T.font.sans }}>
        <window.IC.layout size={34} stroke={T.text.subtle} />
        <div style={{ fontSize: 17, fontWeight: 700, color: T.text.secondary }}>{titulos[nav] || 'Em breve'}</div>
        <div style={{ fontSize: 13.5 }}>Tela ainda não construída neste wireframe.</div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
