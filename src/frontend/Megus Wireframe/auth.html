<body>
<div id="root"></div>

<script type="text/babel">
  // App de auth — alterna login ↔ cadastro por estado. Na produção isto vira
  // rotas react-router (/login e /register); aqui o estado simula a navegação.
  function App() {
    const [tela, setTela] = React.useState('login');
    return tela === 'cadastro'
      ? <window.MegusCadastro onGoLogin={() => setTela('login')} />
      : <window.MegusLogin onGoCadastro={() => setTela('cadastro')} />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
